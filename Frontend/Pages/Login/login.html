<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaStack | Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="login.css">
</head>

<body>

    <main class="auth-container">
        <article class="auth-card">
            <header class="auth-header">
                <span class="brand-logo">NovaStack <br> Barbearia</span>
                <h1 class="auth-title">Bem-vindo de volta!</h1>
                <p class="auth-subtitle">Preencha os campos abaixo para acessar sua conta.</p>
            </header>

            <section class="auth-form-section" aria-label="Formulário de login">
                <form class="auth-form" action="#" method="POST">

                    <div class="input-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email" placeholder="seu@email.com" required
                            autocomplete="email">
                    </div>

                    <div class="input-group">
                        <div class="label-wrapper">
                            <label for="password">Senha</label>
                            <!-- <a href="/recuperar-senha" class="text-link forgot-password">Esqueceu a senha?</a> -->
                        </div>
                        <input type="password" id="password" name="password" placeholder="••••••••" required
                            minlength="8" autocomplete="current-password">
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">Entrar</button>
                </form>
            </section>

            <footer class="auth-card-footer">
                <p>Não tem uma conta? <a href="../Register/register.html" class="text-link font-medium">Crie uma agora</a></p>
            </footer>
        </article>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 NovaStack | Todos os direitos reservados.</p>
    </footer>

</body>

</html>
